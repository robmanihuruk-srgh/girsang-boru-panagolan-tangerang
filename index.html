<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏛️ SM RESORT TANGERANG - Management System</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

    <style>
        /* CSS tetap sama dengan versi Anda sebelumnya untuk menjaga tampilan */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; background: white; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); overflow: hidden; }
        .header { background: linear-gradient(135deg, #2c3e50, #4a6491); color: white; padding: 25px 40px; display: flex; justify-content: space-between; align-items: center; }
        .nav-tabs { display: flex; background: #f8fafc; padding: 10px 20px; border-bottom: 2px solid #e2e8f0; gap: 10px; overflow-x: auto; }
        .nav-btn { padding: 12px 24px; border: none; background: none; cursor: pointer; border-radius: 10px; font-weight: 600; color: #64748b; transition: 0.3s; display: flex; align-items: center; gap: 8px; white-space: nowrap; }
        .nav-btn.active { background: #3b82f6; color: white; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3); }
        .content-section { display: none; padding: 30px; animation: fadeIn 0.4s ease-out; }
        .content-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .login-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .login-card { background: white; padding: 40px; border-radius: 20px; width: 400px; text-align: center; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; }
        .btn-primary { background: #3b82f6; color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; }
        .table-container { overflow-x: auto; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8fafc; color: #475569; }
        .badge { padding: 5px 12px; border-radius: 20px; font-size: 0.85em; font-weight: 600; }
        .badge-income { background: #dcfce7; color: #166534; }
        .badge-expense { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>

    <div id="loginPage" class="login-page">
        <div class="login-card">
            <h2 style="margin-bottom: 20px;">🏛️ Sistem Management</h2>
            <p style="color: #666; margin-bottom: 20px;">Silakan masuk menggunakan Email terdaftar</p>
            <input type="email" id="loginEmail" placeholder="Email (misal: admin@girsang.com)">
            <input type="password" id="loginPassword" placeholder="Password">
            <button onclick="login()" class="btn-primary">Masuk</button>
        </div>
    </div>

    <div id="app" class="container" style="display: none;">
        <div class="header">
            <div>
                <h1>SM RESORT TANGERANG</h1>
                <p id="userDisplay" style="font-size: 0.9em; opacity: 0.8;"></p>
            </div>
            <button onclick="logout()" style="background: rgba(255,255,255,0.2); border: none; color: white; padding: 8px 15px; border-radius: 8px; cursor: pointer;">
                <i class="fas fa-sign-out-alt"></i> Keluar
            </button>
        </div>

        <div class="nav-tabs">
            <button class="nav-btn active" onclick="showSection('members')"><i class="fas fa-users"></i> Anggota</button>
            <button class="nav-btn" onclick="showSection('attendance')"><i class="fas fa-calendar-check"></i> Kehadiran</button>
            <button class="nav-btn" onclick="showSection('finance')"><i class="fas fa-wallet"></i> Keuangan</button>
            <button class="nav-btn" onclick="showSection('admin')" id="adminTab" style="display: none;"><i class="fas fa-user-shield"></i> Admin</button>
        </div>

        <div id="members" class="content-section active">
            <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
                <h3>Daftar Anggota</h3>
                <button onclick="showMemberModal()" class="btn-primary" style="width: auto;">+ Tambah Anggota</button>
            </div>
            <div class="table-container">
                <table id="memberTable">
                    <thead>
                        <tr>
                            <th>ID/KK</th>
                            <th>Nama Lengkap</th>
                            <th>Wilayah</th>
                            <th>Status</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="memberList"></tbody>
                </table>
            </div>
        </div>

        <div id="attendance" class="content-section">
            <h3>Rekap Kehadiran</h3>
            <div class="table-container">
                <table id="attendanceTable">
                    <thead>
                        <tr>
                            <th>Tanggal</th>
                            <th>Nama</th>
                            <th>Metode</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="attendanceList"></tbody>
                </table>
            </div>
        </div>

        <div id="finance" class="content-section">
            <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
                <h3>Laporan Keuangan</h3>
                <button onclick="showFinanceModal()" class="btn-primary" style="width: auto;">+ Catat Transaksi</button>
            </div>
            <div id="financeSummary" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 20px;">
                </div>
            <div class="table-container">
                <table id="financeTable">
                    <thead>
                        <tr>
                            <th>Tanggal</th>
                            <th>Keterangan</th>
                            <th>Kategori</th>
                            <th>Jumlah</th>
                        </tr>
                    </thead>
                    <tbody id="financeList"></tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
        // CONFIGURASI FIREBASE (Pastikan sudah sesuai dengan punya Anda)
        const firebaseConfig = {
  apiKey: "AIzaSyCqF5VG2T03yaHOAq8dPhtvgMYrbVq-DIs",
  authDomain: "girsangborupanagolantangerang.firebaseapp.com",
  databaseURL: "https://girsangborupanagolantangerang-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "girsangborupanagolantangerang",
  storageBucket: "girsangborupanagolantangerang.firebasestorage.app",
  messagingSenderId: "823404152768",
  appId: "1:823404152768:web:c743fa07b22455452b2a25",
  measurementId: "G-716P2TK99Y"
};

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        let currentUser = null;

        // 1. FUNGSI AUTHENTICATION
        async function login() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            try {
                const userCredential = await auth.signInWithEmailAndPassword(email, password);
                // Auth Observer akan menangani sisa prosesnya
                Swal.fire('Berhasil', 'Selamat datang!', 'success');
            } catch (error) {
                Swal.fire('Gagal', 'Email atau password salah: ' + error.message, 'error');
            }
        }

        function logout() {
            auth.signOut().then(() => {
                location.reload();
            });
        }

        // 2. AUTH OBSERVER (Menjalankan Rules auth != null)
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                // User sudah login secara resmi di Firebase
                document.getElementById('loginPage').style.display = 'none';
                document.getElementById('app').style.display = 'block';
                
                // Ambil data user dari database untuk cek role
                const userSnapshot = await db.ref('users/' + user.uid).once('value');
                currentUser = userSnapshot.val() || { role: 'admin' }; // Default admin jika belum ada di DB

                document.getElementById('userDisplay').innerText = `Logged in as: ${user.email}`;
                
                if (currentUser.role === 'admin') {
                    document.getElementById('adminTab').style.display = 'flex';
                }

                loadData(); // Jalankan pengambilan data setelah login terkonfirmasi
            } else {
                document.getElementById('loginPage').style.display = 'flex';
                document.getElementById('app').style.display = 'none';
            }
        });

        // 3. FUNGSI NAVIGASI
        function showSection(sectionId) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            
            document.getElementById(sectionId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        // 4. DATA LOADING (Contoh Integrasi Realtime)
        function loadData() {
            // Load Anggota
            db.ref('members').on('value', snapshot => {
                const list = document.getElementById('memberList');
                list.innerHTML = '';
                snapshot.forEach(child => {
                    const m = child.val();
                    list.innerHTML += `
                        <tr>
                            <td>${m.kk || '-'}</td>
                            <td>${m.name}</td>
                            <td>${m.wilayah || 'Tangerang'}</td>
                            <td><span class="badge badge-income">Aktif</span></td>
                            <td><button onclick="viewQR('${child.key}')"><i class="fas fa-qrcode"></i></button></td>
                        </tr>
                    `;
                });
            });

            // Load Keuangan
            db.ref('finance').on('value', snapshot => {
                const list = document.getElementById('financeList');
                list.innerHTML = '';
                let total = 0;
                snapshot.forEach(child => {
                    const f = child.val();
                    const isIncome = f.type === 'Masuk';
                    total += isIncome ? parseInt(f.amount) : -parseInt(f.amount);
                    list.innerHTML += `
                        <tr>
                            <td>${f.date}</td>
                            <td>${f.desc}</td>
                            <td><span class="badge ${isIncome ? 'badge-income' : 'badge-expense'}">${f.type}</span></td>
                            <td>Rp ${parseInt(f.amount).toLocaleString()}</td>
                        </tr>
                    `;
                });
                updateFinanceSummary(total);
            });
        }

        function updateFinanceSummary(total) {
            const summary = document.getElementById('financeSummary');
            summary.innerHTML = `
                <div style="background: #f1f5f9; padding: 20px; border-radius: 12px; text-align: center;">
                    <h4>Total Saldo Kas</h4>
                    <h2 style="color: #0f172a;">Rp ${total.toLocaleString()}</h2>
                </div>
            `;
        }

        // Fungsi lainnya (Modal, Save Data, dll) silakan dilanjutkan di sini...
        
    </script>
</body>
</html>
