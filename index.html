<!DOCTYPE html>                  
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏛️ Girsang Boru Panagolan Tangerang - Management System</title>
    
    <style>
        /* [Bagian CSS Anda tetap sama seperti file asli] */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; background: white; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); overflow: hidden; }
        .header { background: linear-gradient(135deg, #2c3e50, #4a6491); color: white; padding: 25px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 5px solid #3498db; }
        /* ... Sisa CSS Anda di sini ... */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
        .modal-box { background: white; border-radius: 15px; width: 100%; max-width: 900px; max-height: 90vh; overflow-y: auto; }
        .system-info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin: 20px 0; }
        .system-info-item { background: #f8f9fa; padding: 15px; border-radius: 10px; text-align: center; border-left: 4px solid #3498db; }
    </style>
</head>
<body>
    <div id="loginPage" class="login-container">
        </div>

    <div id="app" class="container" style="display: none;">
        </div>

    <div id="systemInfoModal" class="modal-overlay">
        <div class="modal-box" style="max-width: 600px;">
            <div class="modal-header" style="background: #3498db; color: white; padding: 15px; display: flex; justify-content: space-between;">
                <h3>ℹ️ Informasi Sistem</h3>
                <span style="cursor:pointer" onclick="document.getElementById('systemInfoModal').style.display='none'">×</span>
            </div>
            <div class="modal-body" style="padding: 20px;">
                <div id="systemInfoContent"></div>
            </div>
            <div class="modal-footer" style="padding: 15px; border-top: 1px solid #eee; display: flex; justify-content: flex-end; gap: 10px;">
                <button onclick="backupData()" style="padding: 8px 15px; background: #8e44ad; color: white; border: none; border-radius: 5px; cursor: pointer;">💾 Backup</button>
                <button onclick="showRestoreDialog()" style="padding: 8px 15px; background: #f39c12; color: white; border: none; border-radius: 5px; cursor: pointer;">📥 Restore</button>
                <button onclick="showSystemInfo()" style="padding: 8px 15px; background: #3498db; color: white; border: none; border-radius: 5px; cursor: pointer;">🔄 Refresh</button>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>

    <script>
        // 1. MASUKKAN KONFIGURASI FIREBASE ASLI ANDA DI SINI
        const firebaseConfig = {
            apiKey: "AIzaSy...",
            authDomain: "girsangborupanagolantangerang.firebaseapp.com",
            databaseURL: "https://girsangborupanagolantangerang-default-rtdb.firebaseio.com",
            projectId: "girsangborupanagolantangerang",
            storageBucket: "girsangborupanagolantangerang.appspot.com",
            messagingSenderId: "...",
            appId: "..."
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        // 2. VARIABEL GLOBAL (Tetap sama dengan index_1.html)
        let members = [];
        let attendance = [];
        let finance = [];
        let users = [];
        let currentUser = null;
        window.appStartTime = Date.now();

        // [MASUKKAN SEMUA FUNGSI ASLI ANDA: loadAllData(), login(), renderTable(), dll]
        // Pastikan tidak ada tag <script> di tengah-tengah kode.

        async function loadAllData() {
            // Logika ambil data dari Firebase Anda
            console.log("Memuat data...");
        }

        // =========================================================================
        // TAMBAHAN FUNGSI BACKUP, RESTORE, REFRESH (MODIFIKASI)
        // =========================================================================

        async function backupData() {
            try {
                const fullBackup = {
                    metadata: { date: new Date().toISOString(), user: currentUser?.username || 'System' },
                    members, attendance, finance, users
                };
                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(fullBackup));
                const downloadAnchorNode = document.createElement('a');
                downloadAnchorNode.setAttribute("href", dataStr);
                downloadAnchorNode.setAttribute("download", "backup_girsang_db.json");
                document.body.appendChild(downloadAnchorNode);
                downloadAnchorNode.click();
                downloadAnchorNode.remove();
            } catch (e) { alert("Gagal backup: " + e.message); }
        }

        function showRestoreDialog() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = e => {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = async event => {
                    const data = JSON.parse(event.target.result);
                    if(confirm("Timpa database dengan backup ini?")) {
                        await db.ref('members').set(data.members || {});
                        await db.ref('attendance').set(data.attendance || {});
                        await db.ref('finance').set(data.finance || {});
                        location.reload();
                    }
                };
                reader.readAsText(file);
            };
            input.click();
        }

        async function showSystemInfo() {
            await loadAllData();
            const content = document.getElementById('systemInfoContent');
            const uptime = Math.floor((Date.now() - window.appStartTime) / 60000);
            content.innerHTML = `
                <div class="system-info-grid">
                    <div class="system-info-item"><strong>Status</strong><br>Connected</div>
                    <div class="system-info-item"><strong>Data</strong><br>${members.length} Anggota</div>
                    <div class="system-info-item"><strong>Uptime</strong><br>${uptime} Menit</div>
                </div>`;
            document.getElementById('systemInfoModal').style.display = 'flex';
        }

        // INITIALIZE
        document.addEventListener('DOMContentLoaded', function() {
            // Panggil fungsi cek login asli Anda
            // checkAuthOnLoad(); 
        });
    </script>
</body>
</html>
